<main class="bg-n1 min-h-screen pt-32 pb-24">
	<div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
		<div class="mb-16 text-center">
			<h1 class="font-antic-didone text-n4 mb-6 text-5xl lg:text-7xl">Blog <span class="text-n3 italic">Vetere</span></h1>
			<p class="text-n3 mx-auto max-w-2xl text-lg">Análises, dicas e atualizações sobre o mundo jurídico, traduzidas de forma clara e acessiva.</p>
		</div>

		<div class="bg-n0 border-n2/30 mb-16 flex flex-col gap-6 border p-4 shadow-sm md:flex-row md:items-center md:justify-between">
			<div class="relative w-full md:w-1/2">
				<input type="text" placeholder="Buscar por assunto ou palavra-chave..." class="text-n4 placeholder-n3/70 border-n2 focus:border-n4 w-full border-b bg-transparent py-3 pr-4 pl-12 text-sm transition-colors focus:outline-none" />
				<svg class="text-n3 absolute top-3.5 left-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
			</div>

			<div class="flex flex-wrap gap-2">
				<button class="bg-n4 text-n0 rounded-sm px-4 py-2 text-[10px] font-bold tracking-widest uppercase">Todos</button>
				<button class="border-n4/30 text-n4 hover:bg-n4/5 rounded-sm border px-4 py-2 text-[10px] font-bold tracking-widest uppercase transition-colors">Cível</button>
				<button class="border-n4/30 text-n4 hover:bg-n4/5 rounded-sm border px-4 py-2 text-[10px] font-bold tracking-widest uppercase transition-colors">Trabalhista</button>
			</div>
		</div>

		<div class="mt-20 flex justify-center gap-2">
			<button class="border-n2/50 text-n3 hover:border-n4 hover:text-n4 flex size-10 items-center justify-center border transition-colors disabled:opacity-30">&larr;</button>
			<button class="bg-n4 text-n0 flex size-10 items-center justify-center font-bold">1</button>
			<button class="border-n2/50 text-n4 hover:border-n4 hover:bg-n4/5 flex size-10 items-center justify-center border transition-colors">2</button>
			<button class="border-n2/50 text-n4 hover:border-n4 hover:bg-n4/5 flex size-10 items-center justify-center border transition-colors">3</button>
			<span class="text-n3 flex size-10 items-center justify-center">...</span>
			<button class="border-n2/50 text-n3 hover:border-n4 hover:text-n4 flex size-10 items-center justify-center border transition-colors disabled:opacity-30">&rarr;</button>
		</div>
	</div>
</main>
