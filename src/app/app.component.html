<!-- skip link — visível ao focar via teclado (S7) -->
<a href="#main-content" class="skip-link">Pular para o conteúdo</a>

<app-header />

<main id="main-content" tabindex="-1" class="min-h-screen">

<!-- motion-safe: só pulsa se o usuário não preferir movimento reduzido (S7) -->
<a
	[href]="whatsappUrl"
	target="_blank"
	aria-label="Contato via WhatsApp"
	class="fixed right-4 bottom-4 z-20 flex size-14 items-center justify-center rounded-full bg-[#25D366] text-white transition-all hover:animate-none hover:bg-[#128C7E] hover:shadow-lg motion-safe:animate-pulse">
	<mat-icon class="size-7!" svgIcon="whatsapp_logo"></mat-icon>
</a>
